<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>增量更新</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #1b1e2e;
        font-family:
          -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
        font-size: 13px;
        color: #c8cdd8;
        overflow: hidden;
        -webkit-app-region: drag;
        user-select: none;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 20px 28px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .logo {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        border-radius: 6px;
        object-fit: contain;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        color: #e2e5ed;
        letter-spacing: 0.5px;
      }
      .status-area {
        text-align: center;
      }
      .status-text {
        font-size: 12px;
        color: #8b91a3;
        line-height: 1.6;
        min-height: 20px;
      }
      .status-text .dot::after {
        content: "";
        animation: dots 1.5s steps(4, end) infinite;
      }
      @keyframes dots {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
        100% {
          content: "...";
        }
      }
      .progress-wrap {
        width: 260px;
        height: 4px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 6px;
        overflow: hidden;
        margin: 14px auto 0;
        display: none;
      }
      .progress-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #5b8def, #7c6ff7);
        border-radius: 6px;
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 0.3s ease;
        box-shadow: 0 0 10px rgba(91, 141, 239, 0.35);
      }
      .progress-detail {
        font-size: 11px;
        color: #5e6478;
        margin-top: 6px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          id="logoImg"
          class="logo"
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34' fill='none'%3E%3Crect width='34' height='34' rx='8' fill='url(%23g)'/%3E%3Cpath d='M17 10v10M12 16l5 5 5-5' stroke='%23fff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M10 22h14' stroke='%23fff' stroke-width='2' stroke-linecap='round'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='34' y2='34' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%235b8def'/%3E%3Cstop offset='1' stop-color='%237c6ff7'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E"
          alt="更新"
        />
        <span class="title" id="titleText">增量更新</span>
      </div>
      <div class="status-area">
        <div class="status-text" id="status">
          正在检查更新<span class="dot"></span>
        </div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-detail" id="progressDetail"></div>
      </div>
    </div>
    <script>
      const MAIN_MESSAGE = "@electron-delta/updater:main";
      var statusDom = document.getElementById("status");
      var titleDom = document.getElementById("titleText");
      var progressBar = document.getElementById("progressBar");
      var progressWrap = document.getElementById("progressWrap");
      var progressDetail = document.getElementById("progressDetail");

      var appName = window.__APP_NAME__ || "";

      function setProgress(pct) {
        progressBar.style.transform = "scaleX(" + pct / 100 + ")";
      }

      // 支持自定义 logo 注入
      if (window.__CUSTOM_LOGO__) {
        var logoImg = document.getElementById("logoImg");
        if (logoImg) {
          logoImg.src = window.__CUSTOM_LOGO__;
        }
      }

      window.addEventListener(MAIN_MESSAGE, function (event) {
        var data = event.detail;
        var eventName = data.eventName;
        var payload = data.payload;

        var titlePrefix = appName ? appName + " " : "";

        switch (eventName) {
          case "checking-for-update":
            titleDom.textContent = titlePrefix + "检查更新";
            statusDom.innerHTML = '正在检查更新<span class="dot"></span>';
            break;
          case "update-available":
            titleDom.textContent = titlePrefix + "发现新版本";
            statusDom.innerHTML = "发现新版本，准备下载...";
            progressWrap.style.display = "block";
            progressDetail.style.display = "block";
            break;
          case "update-not-available":
            titleDom.textContent = titlePrefix + "正在启动";
            statusDom.innerHTML = '正在启动<span class="dot"></span>';
            break;
          case "error":
            titleDom.textContent = titlePrefix + "启动中";
            statusDom.textContent = "更新出错，正在启动...";
            break;
          case "download-progress":
            var percentage = payload.percentage;
            titleDom.textContent = titlePrefix + "正在更新";
            setProgress(percentage);
            statusDom.textContent = "正在下载 " + percentage + "%";
            progressDetail.textContent =
              payload.transferred + " / " + payload.total;
            break;
          case "update-downloaded":
            titleDom.textContent = titlePrefix + "安装更新";
            statusDom.innerHTML = '正在安装更新<span class="dot"></span>';
            setProgress(100);
            progressDetail.textContent = "";
            break;
          default:
            titleDom.textContent = titlePrefix + "正在启动";
            statusDom.innerHTML = '正在启动<span class="dot"></span>';
        }
      });
    </script>
  </body>
</html>
